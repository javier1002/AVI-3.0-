<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala Protegida | AVI 3.0</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #6a11cb;
            background: linear-gradient(to right, #2575fc, #6a11cb);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; color: #333;
        }
        .lock-card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center;
            width: 100%; max-width: 400px;
        }
        h2 { margin-top: 0; color: #444; }
        input {
            width: 100%; padding: 12px; margin: 15px 0;
            border: 2px solid #ddd; border-radius: 8px; font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; background: #6a11cb; color: white;
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #5a0eb0; }
        .error { color: #ff4757; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>
    <div class="lock-card">
        <div style="font-size: 50px; margin-bottom: 20px;">🔒</div>
        <h2>Sala Protegida</h2>
        <p>La sala <strong>{{ room }}</strong> requiere contraseña.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <span class="error">{{ message }}</span>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('main.sala') }}">
            <input type="hidden" name="room" value="{{ room }}">
            <input type="hidden" name="username" value="{{ username }}">

            <input type="password" name="password" placeholder="Ingresa la contraseña" required autofocus>
            <button type="submit">Entrar a la Sala</button>
        </form>

        <br>
        <a href="{{ url_for('main.home') }}" style="color: #666; text-decoration: none; font-size: 14px;">Volver al inicio</a>
    </div>
</body>
</html>

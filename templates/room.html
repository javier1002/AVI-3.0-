{% extends "layout.html" %}
{% block content %}
<h1>Configurar sala Vdo.Ninja</h1>


<form id="roomForm">
    <label>Nombre de la sala
        <!-- boton obligatorio para configurar el nombre de la sala -->
        <input type="text" id="roomName" placeholder="Nombre de la sala" required>
    </label>
    <label> Contraseña(opcional)
        <input type="password" id="password" placeholder="Contraseña">
    </label>
    <button type="submit"> Entrar como HOST</button>
</form>
{% endblock %}
